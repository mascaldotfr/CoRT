<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta property="og:image" content="https://cort.ovh/favicon_512.png">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<meta name="keywords" content="regnumsentinel champions regnum online trainer entrenador epicos bosses war guerra status">
		<meta name="description" content="Champions of Regnum trainer, war status, bosses respawn and bz countdowns">
		<title>CoRT - Champions of Regnum Trainer</title>
		<link rel="stylesheet" href="css/style.css">
		<link rel="stylesheet" href="css/trainer.css">
		<script type="module" src="js/libs/cortlibs.js"></script>
		<script type="module" src="js/menu.js"></script>
		<script type="module" src="js/trainer.js"></script>
		<link rel="modulepreload" href="js/libs/floating-ui-tooltip.js">
		<link rel="preload" href="data/trainer/1.35.19/trainerdata.json" as="fetch" crossorigin="anonymous">
		<link rel="preload" href="data/trainer/1.35.19/icons/SlashingWeapons.webp" as="image" fetchpriority="low">
		<link rel="icon" type="image/png" href="favicon.png">
		<link rel="apple-touch-icon" href="favicon.png" sizes="192x192">
		<link rel="manifest" href="manifest.json" />
	</head>
	<body>
		<nav id="menu" class="card"></nav>
		<main id="main-container" class="t-main-container">
			<h1 id="title">&nbsp;</h1>
			<div id="titleinfo">&nbsp;</div>
			<section class="setup card">
				<select id="t-version">
					<option>&nbsp;</option>
				</select>
				<select id="t-class">
					<option>&nbsp;</option>
				</select>
				<select id="t-level">
					<option value="60" default selected>60</option>
				</select>
				<button id="t-load">&nbsp;</button>
				<button id="t-save">&nbsp;</button>
			</section>
			<section class="card points" id="t-points">
					<div class="needed-for-flex">
					<span class="bold" id="t-dpoints-label">&nbsp;</span>
					<span id="t-dpointsleft">&nbsp;&nbsp;</span>&nbsp;/&nbsp;<span id="t-dpointstotal">&nbsp;</span>
					</div>
					<div class="needed-for-flex">
					<span class="bold" id="t-ppoints-label">&nbsp;</span>
					<span id="t-ppointsleft">&nbsp;&nbsp;</span>&nbsp;/&nbsp;<span id="t-ppointstotal">&nbsp;</span>
					</div>
			</section>
			<section id="t-trainer" class="trainer">
				<!-- placeholders -->
				<div class="card t-placeholder-card"></div>
				<div class="card t-placeholder-card"></div>
				<div class="card t-placeholder-card"></div>
				<div class="card t-placeholder-card"></div>
				<div class="card t-placeholder-card"></div>
				<div class="card t-placeholder-card"></div>
				<div class="card t-placeholder-card"></div>
			</section>
		</main>
		<footer id="footer" class="card"></footer>
		<section id="t-sharedlink" class="card">
			<h3></h3>
			<textarea id="t-sharedlink-url" readonly rows="5" cols="50"></textarea>
			<div id="t-sharedlink-buttons">
				<button id="t-sharedlink-copy"></button>
				<button id="t-sharedlink-close"></button>
			</div>
		</section>
	</body>
</html>
